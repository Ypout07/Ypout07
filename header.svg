<svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" fill="#1E293B" />

  <text x="400" y="210" font-family="Georgia, serif" font-size="36" fill="#F8FAFC" text-anchor="middle" letter-spacing="3">NATHAN MCCORMICK</text>
  <text x="400" y="240" font-family="Georgia, serif" font-size="14" fill="#94A3B8" text-anchor="middle" letter-spacing="1" font-style="italic">Math &amp; Computer Science</text>

  <g transform="translate(400, 60)">
    
    <ellipse cx="0" cy="0" rx="4" ry="6" fill="#3B82F6">
      <animate attributeName="cy" values="0; 80; 80; 0" keyTimes="0; 0.4; 0.9; 1" dur="2.5s" repeatCount="indefinite" />
      <animate attributeName="ry" values="6; 8; 0; 0" keyTimes="0; 0.38; 0.4; 1" dur="2.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="1; 1; 0; 0" keyTimes="0; 0.39; 0.4; 1" dur="2.5s" repeatCount="indefinite" />
    </ellipse>

    <circle cx="0" cy="80" r="2" fill="#3B82F6" opacity="0">
      <animate attributeName="cx" values="0; -20" keyTimes="0.4; 0.6" dur="2.5s" repeatCount="indefinite" />
      <animate attributeName="cy" values="80; 60" keyTimes="0.4; 0.6" dur="2.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0; 1; 0" keyTimes="0.39; 0.4; 0.6" dur="2.5s" repeatCount="indefinite" />
    </circle>

    <circle cx="0" cy="80" r="2" fill="#3B82F6" opacity="0">
      <animate attributeName="cx" values="0; 20" keyTimes="0.4; 0.6" dur="2.5s" repeatCount="indefinite" />
      <animate attributeName="cy" values="80; 60" keyTimes="0.4; 0.6" dur="2.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0; 1; 0" keyTimes="0.39; 0.4; 0.6" dur="2.5s" repeatCount="indefinite" />
    </circle>

    <ellipse cx="0" cy="82" rx="0" ry="0" fill="none" stroke="#3B82F6" stroke-width="2" opacity="0">
      <animate attributeName="rx" values="0; 35" keyTimes="0.4; 0.7" dur="2.5s" repeatCount="indefinite" />
      <animate attributeName="ry" values="0; 10" keyTimes="0.4; 0.7" dur="2.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0; 1; 0" keyTimes="0.39; 0.4; 0.7" dur="2.5s" repeatCount="indefinite" />
    </ellipse>

  </g>
</svg>
