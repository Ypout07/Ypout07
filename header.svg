<svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" fill="#1E293B" />

  <text x="400" y="240" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="200" font-size="32" fill="#F8FAFC" text-anchor="middle" letter-spacing="6">NATHAN MCCORMICK</text>
  
  <text x="400" y="270" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="300" font-size="14" fill="#94A3B8" text-anchor="middle" letter-spacing="2">Math &amp; Computer Science</text>

  <g>
    <animateTransform 
      attributeName="transform" 
      type="rotate" 
      values="-35 400 60; 35 400 60; -35 400 60" 
      keyTimes="0; 0.5; 1" 
      calcMode="spline"
      keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"
      dur="3s" 
      repeatCount="indefinite" />
    
    <circle cx="400" cy="60" r="2" fill="#475569" />
    
    <line x1="400" y1="60" x2="400" y2="160" stroke="#64748B" stroke-width="1" />
    
    <circle cx="400" cy="160" r="6" fill="#F8FAFC" />
  </g>
</svg>
